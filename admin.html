<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin | Lufalight</title>
<meta name="robots" content="noindex,nofollow"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#E82D2D;--redl:#F05555;--bg:#FFFFFF;--bg2:#F6F6F8;--line:rgba(0,0,0,.1);--muted:#5C606B;--white:#14151A;--r:10px}
body{background:var(--bg2);color:var(--white);font-family:system-ui,sans-serif;line-height:1.5;min-height:100vh}
.wrap{max-width:880px;margin:0 auto;padding:40px 24px}
h1{font-size:1.5rem;font-weight:800;margin-bottom:4px}
.sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.card{background:var(--bg);border:1px solid var(--line);border-radius:var(--r);padding:24px;margin-bottom:20px}
label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:7px;font-size:14px;margin-bottom:14px}
button{background:var(--red);color:#fff;border:none;padding:11px 22px;border-radius:7px;font-weight:700;font-size:13px;cursor:pointer}
button:hover{background:var(--redl)}
button:disabled{opacity:.5;cursor:not-allowed}
.btn-g{background:transparent;border:1px solid var(--line);color:var(--white)}
#error{display:none;background:rgba(232,45,45,.08);border:1px solid rgba(232,45,45,.3);color:var(--red);border-radius:7px;padding:10px 13px;font-size:13px;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--line)}
th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.low{color:var(--red);font-weight:700}
.qty-input{width:80px;padding:6px 8px;margin:0}
.row-actions{display:flex;gap:6px;align-items:center}
#dash{display:none}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.rev-row{border-bottom:1px solid var(--line);padding:14px 0}
.rev-row:last-child{border-bottom:none}
.rev-meta{font-size:12px;color:var(--muted);margin-bottom:4px}
.rev-stars{color:#c9993a;font-size:13px}
.rev-title{font-weight:700;font-size:13px;margin:4px 0 2px}
.rev-body{font-size:13px;color:var(--white);line-height:1.5;margin-bottom:8px}
.btn-approve{background:#1e9e4a}
.btn-approve:hover{background:#27b85a}
.btn-reject{background:transparent;border:1px solid var(--line);color:var(--red)}
.empty-state{color:var(--muted);font-size:13px;text-align:center;padding:20px 0}
</style>
</head>
<body>
<div class="wrap">
  <h1>LUFALIGHT Admin</h1>
  <p class="sub">Internal inventory &amp; order management — not part of the public storefront.</p>

  <div id="loginCard" class="card">
    <div id="error"></div>
    <label for="email">Email</label>
    <input type="email" id="email" autocomplete="username"/>
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password"/>
    <button id="loginBtn" onclick="login()">Log In</button>
  </div>

  <div id="dash">
    <div class="topbar">
      <div id="whoami" class="sub" style="margin:0"></div>
      <button class="btn-g" onclick="logout()">Log Out</button>
    </div>
    <div class="card">
      <h2 style="font-size:1rem;margin-bottom:14px">Inventory</h2>
      <table>
        <thead><tr><th>SKU</th><th>Name</th><th>Stock</th><th>Threshold</th><th></th></tr></thead>
        <tbody id="invBody"></tbody>
      </table>
    </div>
    <div class="card">
      <h2 style="font-size:1rem;margin-bottom:14px">Pending Reviews</h2>
      <div id="reviewsBody"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Fill these in once Supabase is set up (Project Settings → API). The anon key is safe to
// expose client-side by design — Row Level Security in Postgres is what actually protects
// data, and our backend additionally checks the logged-in email against ADMIN_EMAILS.
const SUPABASE_URL = window.LUFALIGHT_SUPABASE_URL || 'https://YOUR_PROJECT.supabase.co';
const SUPABASE_ANON_KEY = window.LUFALIGHT_SUPABASE_ANON_KEY || 'YOUR_ANON_KEY';
const BACKEND_URL = window.LUFALIGHT_BACKEND_URL || 'http://localhost:4000';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  document.getElementById('error').style.display = 'none';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  btn.disabled = false;

  if (error) return showError(error.message);
  await afterLogin(data.session);
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

async function afterLogin(session) {
  document.getElementById('loginCard').style.display = 'none';
  document.getElementById('dash').style.display = 'block';
  document.getElementById('whoami').textContent = `Logged in as ${session.user.email}`;
  await loadInventory(session.access_token);
  await loadPendingReviews(session.access_token);
}

async function logout() {
  await sb.auth.signOut();
  document.getElementById('dash').style.display = 'none';
  document.getElementById('loginCard').style.display = 'block';
}

async function loadInventory(token) {
  const res = await fetch(`${BACKEND_URL}/admin/inventory`, {
    headers: { Authorization: `Bearer ${token}` },
  });
  const data = await res.json();
  if (!res.ok) return showError(data.error || 'Failed to load inventory');

  document.getElementById('invBody').innerHTML = data.inventory.map((row) => `
    <tr>
      <td>${row.sku}</td>
      <td>${row.name || ''}</td>
      <td class="${row.low_stock ? 'low' : ''}">${row.stock_qty}${row.low_stock ? ' ⚠️' : ''}</td>
      <td>${row.low_stock_threshold}</td>
      <td class="row-actions">
        <input type="number" min="0" class="qty-input" id="qty-${row.sku}" value="${row.stock_qty}"/>
        <button onclick="updateStock('${row.sku}')">Save</button>
      </td>
    </tr>
  `).join('');
}

async function updateStock(sku) {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return showError('Session expired — please log in again');

  const stock_qty = Number(document.getElementById(`qty-${sku}`).value);
  const res = await fetch(`${BACKEND_URL}/admin/inventory/${sku}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
    body: JSON.stringify({ stock_qty }),
  });
  const data = await res.json();
  if (!res.ok) return showError(data.error || 'Update failed');
  await loadInventory(session.access_token);
}

async function loadPendingReviews(token) {
  const res = await fetch(`${BACKEND_URL}/admin/reviews/pending`, {
    headers: { Authorization: `Bearer ${token}` },
  });
  const data = await res.json();
  const body = document.getElementById('reviewsBody');
  if (!res.ok) return showError(data.error || 'Failed to load reviews');

  if (!data.reviews.length) {
    body.innerHTML = '<div class="empty-state">No reviews waiting for moderation 🎉</div>';
    return;
  }

  body.innerHTML = data.reviews.map((r) => `
    <div class="rev-row">
      <div class="rev-meta">${escapeHtml(r.sku)} — ${escapeHtml(r.customer_name)} — ${new Date(r.created_at).toLocaleDateString()}</div>
      <div class="rev-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
      ${r.title ? `<div class="rev-title">"${escapeHtml(r.title)}"</div>` : ''}
      <div class="rev-body">${escapeHtml(r.body)}</div>
      <div class="row-actions">
        <button class="btn-approve" onclick="approveReview('${r.id}')">Approve</button>
        <button class="btn-reject" onclick="rejectReview('${r.id}')">Reject</button>
      </div>
    </div>
  `).join('');
}

async function approveReview(id) {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return showError('Session expired — please log in again');

  const res = await fetch(`${BACKEND_URL}/admin/reviews/${id}/approve`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${session.access_token}` },
  });
  const data = await res.json();
  if (!res.ok) return showError(data.error || 'Approve failed');
  await loadPendingReviews(session.access_token);
}

async function rejectReview(id) {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return showError('Session expired — please log in again');

  const res = await fetch(`${BACKEND_URL}/admin/reviews/${id}`, {
    method: 'DELETE',
    headers: { Authorization: `Bearer ${session.access_token}` },
  });
  const data = await res.json();
  if (!res.ok) return showError(data.error || 'Reject failed');
  await loadPendingReviews(session.access_token);
}

// Resume an existing session on page reload instead of forcing re-login every time.
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await afterLogin(session);
})();
</script>
<script src="inquiry-cart.js"></script></body>
</html>
